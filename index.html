<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#0f0f1a;color:#eee;touch-action:manipulation;-webkit-overflow-scrolling:touch}
#app{width:100%;height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* ===== 启动画面 ===== */
#start-screen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#0f0f1a,#16162e,#0f0f1a);transition:opacity .4s;overflow-y:auto;padding:20px}
#start-screen.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.start-inner{text-align:center;max-width:380px;width:100%}
.s-avatar{width:68px;height:68px;border-radius:50%;margin:0 auto 6px;overflow:hidden;border:2px solid rgba(245,158,11,.35);box-shadow:0 0 24px rgba(245,158,11,.12)}
.s-avatar img{width:100%;height:100%;object-fit:cover}
.s-name{font-size:15px;font-weight:500;color:rgba(255,255,255,.45);letter-spacing:3px;margin-bottom:8px}
.s-title{font-size:44px;font-weight:800;line-height:1.1;background:linear-gradient(135deg,#f7c948,#f59e0b,#f7c948);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;letter-spacing:4px}
.s-subtitle{font-size:14px;color:rgba(255,255,255,.25);letter-spacing:6px;margin-bottom:22px}
.s-btn{background:linear-gradient(135deg,#f59e0b,#e88d0a);color:#1a1a2e;border:none;border-radius:14px;padding:13px 52px;font-size:17px;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 4px 24px rgba(245,158,11,.25);letter-spacing:6px;margin-bottom:30px}
.s-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(245,158,11,.35)}
.s-btn:active{transform:scale(.97)}
.s-rules-title{font-size:13px;color:rgba(255,255,255,.25);letter-spacing:6px;margin-bottom:16px}
.s-rule-block{margin-bottom:14px;text-align:left;padding:0 20px}
.s-rule-label{font-size:14px;color:rgba(255,255,255,.55);letter-spacing:2px;margin-bottom:6px}
.s-emoji{font-size:18px;margin-right:6px}
.s-diagram{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.d-card{display:inline-flex;align-items:center;justify-content:center;width:44px;height:64px;border-radius:10px;font-size:24px;font-weight:800;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.d-c1{background:linear-gradient(145deg,#2d1b69,#1a0e3e);border:1px solid rgba(139,92,246,.3)}
.d-c2{background:linear-gradient(145deg,#1b4a6b,#0e2a3e);border:1px solid rgba(56,189,248,.3)}
.d-c3{background:linear-gradient(145deg,#6b2d1b,#3e1a0e);border:1px solid rgba(251,146,60,.3)}
.d-c4{background:linear-gradient(145deg,#1b4a6b,#0e2a3e);border:1px solid rgba(56,189,248,.3)}
.d-c5{background:linear-gradient(145deg,#6b2d1b,#3e1a0e);border:1px solid rgba(251,146,60,.3)}
.d-arrow{font-size:28px;color:rgba(255,255,255,.2)}
.d-arrow2{font-size:22px;color:rgba(255,255,255,.2);margin:0 4px}
.s-rule-desc{font-size:13px;color:rgba(255,255,255,.4);line-height:1.6;text-align:center}
.s-rule-title{font-size:13px;color:rgba(255,255,255,.25);letter-spacing:6px;margin-bottom:12px}

/* ===== 模式选择页 ===== */
#mode-screen{position:fixed;inset:0;z-index:400;display:none;background:linear-gradient(160deg,#0f0f1a,#16162e,#0f0f1a);flex-direction:column;align-items:center;justify-content:center;padding:20px}
#mode-screen button{font-family:inherit}
#mode-screen .mode-group{width:100%;max-width:300px;display:flex;flex-direction:column;align-items:center;gap:10px}
#mode-screen .btn-primary{width:100%;border:none;border-radius:14px;padding:14px 0;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:3px;background:linear-gradient(135deg,#f59e0b,#e88d0a);color:#1a1a2e;box-shadow:0 4px 20px rgba(245,158,11,.2)}
#mode-screen .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(245,158,11,.3)}
#mode-screen .btn-primary:active{transform:scale(.97)}
#mode-screen .btn-secondary{width:100%;border:none;border-radius:14px;padding:12px 0;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:2px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.55)}
#mode-screen .btn-secondary:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.75)}
#mode-screen .btn-secondary:active{transform:scale(.97)}
#mode-screen .btn-feedback{width:100%;border:1px solid rgba(99,102,241,.35);border-radius:14px;padding:11px 0;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:2px;background:rgba(99,102,241,.15);color:#a5b4fc}
#mode-screen .btn-feedback:hover{background:rgba(99,102,241,.25);color:#c7d2fe}
#mode-screen .btn-feedback:active{transform:scale(.97)}
#mode-screen .mode-divider{width:80%;max-width:240px;height:1px;background:rgba(255,255,255,.06);margin:4px 0}
#mode-screen .mode-title{font-size:14px;color:rgba(255,255,255,.2);letter-spacing:3px;margin-bottom:16px}

/* ===== 留言弹窗 ===== */
#mode-fb-form{display:none;position:fixed;inset:0;z-index:450;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);align-items:center;justify-content:center}
#mode-fb-form .fb-box{background:linear-gradient(145deg,#1e1e3a,#15152a);border-radius:24px;padding:24px 20px;max-width:340px;width:90%;text-align:center;max-height:80vh;overflow-y:auto}
#mode-fb-form .fb-title{font-size:16px;font-weight:700;margin-bottom:4px;color:#e0e7ff}
#mode-fb-form .fb-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:12px}
#mode-fb-form .fb-msgs{display:flex;flex-direction:column;gap:5px;max-height:100px;overflow-y:auto;margin-bottom:10px;padding-right:3px}
#mode-fb-form .fb-msgs-empty{font-size:13px;color:rgba(255,255,255,.3);text-align:center;padding:10px 0}
#mode-fb-form input{width:100%;padding:9px 12px;border:1px solid rgba(255,255,255,.15);border-radius:10px;font-size:13px;background:rgba(255,255,255,.08);color:#f0f0f0;outline:none;margin-bottom:6px}
#mode-fb-form textarea{width:100%;padding:9px 12px;border:1px solid rgba(255,255,255,.15);border-radius:10px;font-size:13px;background:rgba(255,255,255,.08);color:#f0f0f0;outline:none;resize:none;height:46px;margin-bottom:8px}
#mode-fb-form .fb-btn-group{display:flex;gap:8px}
#mode-fb-form .fb-btn-cancel{flex:1;padding:8px 0;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.1);color:rgba(255,255,255,.65)}
#mode-fb-form .fb-btn-send{flex:1;padding:8px 0;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:rgba(99,102,241,1);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.3)}
#mode-fb-form .fb-btn-send:disabled{opacity:.4;cursor:default}
#mode-fb-form .fb-status{font-size:12px;color:rgba(255,255,255,.5);text-align:center;min-height:18px;line-height:18px;margin-top:4px}

/* ===== 规则说明 ===== */
#rules-screen{position:fixed;inset:0;z-index:400;display:none;background:linear-gradient(160deg,#0f0f1a,#16162e,#0f0f1a);overflow-y:auto;padding:20px}
.rules-inner{max-width:380px;margin:0 auto;text-align:center}
.rules-back{background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);border:none;border-radius:10px;padding:10px 30px;font-size:14px;font-weight:600;cursor:pointer;margin-top:18px;font-family:inherit}
.rules-back:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
</style>
</head>

    <div class="rules-inner">

<script>
// ===== 留言系统 =====
(function(){
  const FB_URL = 'https://pkxmsfyzcphzvuangrzs.supabase.co/rest/v1/_feedback';
  const FB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBreG1zZnl6Y3BoenZ1YW5ncnpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDcwNDk4MzQsImV4cCI6MjA2MjYyNTgzNH0.glpKH2mHX1-Ddlx77WFa92Rr6rR6R_xWbglf_j0zRTI';
  var fbMsgs = document.getElementById('mode-msgs');
  var fbEmpty = document.getElementById('mode-fb-empty');
  var fbName = document.getElementById('mode-fb-name');
  var fbText = document.getElementById('mode-fb-text');
  var fbSend = document.getElementById('mode-fb-send');
  var fbStatus = document.getElementById('mode-fb-status');

  function enableSend(){fbSend.disabled = !(fbName.value.trim() && fbText.value.trim());}
  fbName.addEventListener('input', enableSend);
  fbText.addEventListener('input', enableSend);

  fbSend.addEventListener('click', function(){
    var n = fbName.value.trim(), t = fbText.value.trim();
    if(!n || !t) return;
    fbSend.disabled = true;
    fbStatus.textContent = '发送中...';
    fetch(FB_URL, {
      method:'POST', headers:{'Content-Type':'application/json','apikey':FB_KEY,'Authorization':'Bearer '+FB_KEY,'Prefer':'return=minimal'},
      body:JSON.stringify({name:n,text:t,created_at:new Date().toISOString()})
    }).then(function(){
      fbText.value = '';
      fbStatus.textContent = '✅ 发送成功！';
      fbSend.disabled = true;
      loadFB();
    }).catch(function(){
      fbStatus.textContent = '❌ 发送失败，稍后再试';
      fbSend.disabled = false;
    });
  });

  function loadFB(){
    fetch(FB_URL+'?select=name,text,created_at&order=created_at.desc&limit=50', {
      headers:{'apikey':FB_KEY,'Authorization':'Bearer '+FB_KEY}
    }).then(function(r){return r.json();}).then(function(d){
      if(!d || !d.length){fbMsgs.innerHTML = '<div class="fb-msgs-empty">还没有留言，快来第一条吧 ✍️</div>'; return;}
      fbMsgs.innerHTML = d.map(function(m){
        var t = m.created_at ? new Date(m.created_at).toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        return '<div style="font-size:12px;text-align:left;padding:4px 6px;background:rgba(255,255,255,.04);border-radius:6px"><span style="color:#fbbf24;font-weight:600">'+esc(m.name)+'</span> <span style="color:rgba(255,255,255,.45)">'+esc(m.text)+'</span> <span style="font-size:10px;color:rgba(255,255,255,.2);float:right">'+t+'</span></div>';
      }).join('');
    }).catch(function(){});
  }
  function esc(s){return String(s).replace(/[<>&"]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c];});}
  document.getElementById('mode-fb-cancel').addEventListener('click', function(){
    document.getElementById('mode-fb-form').style.display = 'none';
  });
  document.getElementById('mode-fb-btn').addEventListener('click', function(){
    document.getElementById('mode-fb-form').style.display = 'flex';
    loadFB();
  });
  loadFB();
})();

// ===== 页面切换 =====
document.getElementById('start-btn').addEventListener('click', function(){
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('mode-screen').style.display = 'flex';
});

document.getElementById('mode-free').addEventListener('click', function(){
  window.location.href = 'game-24point/';
});

document.getElementById('mode-mathchain').addEventListener('click', function(){
  window.location.href = 'mathchain/';
});

document.getElementById('mode-rules').addEventListener('click', function(){
  document.getElementById('mode-screen').style.display = 'none';
  document.getElementById('rules-screen').style.display = 'block';
});

document.getElementById('rules-back-btn').addEventListener('click', function(){
  document.getElementById('rules-screen').style.display = 'none';
  document.getElementById('mode-screen').style.display = 'flex';
});
</script>
</body>
