<style>

html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#0f0f1a;color:#eee;touch-action:manipulation;-webkit-overflow-scrolling:touch}
#app{width:100%;height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

<div id="app">
  <div id="header">

      <button class="modal-btn-primary" id="exit-confirm" style="padding:10px 20px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;background:#ef4444;color:#fff">确定退出</button>
    </div>
  </div>

<script>
// Sound system
const Sound = (() => {
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function play(freq, dur, type, vol, delay) {
    const c = getCtx();
    const o = c.createOscillator(), g = c.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, c.currentTime + (delay || 0));
    g.gain.setValueAtTime(vol || 0.15, c.currentTime + (delay || 0));
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + (delay || 0) + dur);
    o.connect(g); g.connect(c.destination);
    o.start(c.currentTime + (delay || 0));
    o.stop(c.currentTime + (delay || 0) + dur);
  }
  return {
    pickUp() { play(600, 0.08, 'sine', 0.1); },

// Math helpers
function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function fracOp(aN, aD, bN, bD, op) {
  // Compute (aN/aD) op (bN/bD) -> {num, den}
  if (op === '+') return { num: aN*bD + bN*aD, den: aD*bD };
  if (op === '×') return { num: aN*bN, den: aD*bD };
  if (op === '−') {

}

// Puzzle generation
function generateNumbers(mode, rule) {
  const max = mode === 'easy' ? 10 : 13, min = 1;
  const solver = rule === 'int' ? canSolveInt : canSolveFrac;
  let nums, att = 0;
  do { nums = [min + Math.random() * max | 0, min + Math.random() * max | 0, min + Math.random() * max | 0, min + Math.random() * max | 0]; att++; } while (!solver(nums) && att < 5000);

}
function canSolveFrac(n) {
  if (n.length === 1) return Math.abs(n[0] - 24) < 1e-4;
  for (let i = 0; i < n.length; i++) for (let j = i + 1; j < n.length; j++) {

    const rs = [a + b, a * b, Math.max(a,b) - Math.min(a,b)];
    const mn = Math.min(a,b), mx = Math.max(a,b);
    if (mn) rs.push(mx / mn);
    for (const r of rs) if (canSolveFrac([...rem, r])) return true;
  }

}

  if (n.length === 1) return Math.abs(n[0] - 24) < 1e-4;
  for (let i = 0; i < n.length; i++) for (let j = i + 1; j < n.length; j++) {
    const rem = n.filter((_,k)=>k!==i&&k!==j), a = n[i], b = n[j];

}

function getBubblesForPair(ca, cb) {

  // +, ×: always valid
  const add = fracOp(aN, aD, bN, bD, '+');
  r.push({ op:'+', result:add.num/add.den, name:'加', label:getCardLabel(a)+'加'+getCardLabel(b), valid:true, frac:isFrac && add.den !== 1 ? fracStr(add.num, add.den) : null });
  const mul = fracOp(aN, aD, bN, bD, '×');
  r.push({ op:'×', result:mul.num/mul.den, name:'乘', label:getCardLabel(a)+'乘'+getCardLabel(b), valid:true, frac:isFrac && mul.den !== 1 ? fracStr(mul.num, mul.den) : null });

}

function computeCardPositions(count, cw, ch, pw, ph) {

function showBubbles(draggedId, targetId) {

function updateBubbleOpacity(dist) {
  const mcs = bubbleLayer.querySelectorAll('.mini-card');

function findClosestCard(cx, cy, excludeId) {

  let closest = null, minDist = Infinity;
  for (const el of els) {
    const id = parseInt(el.dataset.cardId);
    if (id === excludeId) continue;
    const x = parseFloat(el.style.left), y = parseFloat(el.style.top);
    const dist = Math.hypot(cx - x - CARD_W / 2, cy - y - CARD_H / 2);

function getPointerPos(e) {
  if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onPointerDown(e) {

  state.draggedCard = id; state.dragOffsetX = cp.x - parseFloat(cardEl.style.left); state.dragOffsetY = cp.y - parseFloat(cardEl.style.top);
  if (isFloating) { const cs = getCardState(id); state.startX = cs ? cs.x : parseFloat(cardEl.style.left); state.startY = cs ? cs.y : parseFloat(cardEl.style.top); state.startZIndex = ''; }
  else { state.startX = parseFloat(cardEl.style.left); state.startY = parseFloat(cardEl.style.top); state.startZIndex = cardEl.style.zIndex || ''; }

function onPointerMove(e) {

    let num = result, den = 1;
    if (state.rule === 'frac') {
      const aN = dc.num || dc.value, aD = dc.den || 1, bN = tc.num || tc.value, bD = tc.den || 1;
      const f = fracOp(aN, aD, bN, bD, op);

    }
    const fd = (state.rule === 'frac' && den !== 1) ? fracStr(num, den) : null;
    const nc = { id: state.nextId++, value: num/den, num, den, history: label, x: tc.x, y: tc.y, colorIdx: ci, entering: true, fracDisplay: fd };
    mergeParents[nc.id] = {

    checkGameState(); updateStatus();

}

function showHint() {

    const a = state.cards[i].value, b = state.cards[j].value;
    const rem = state.cards.filter((_,k) => k !== i && k !== j).map(c => c.value);
    const ops = [{op:'加',r:a+b},{op:'乘',r:a*b},{op:'减',r:Math.max(a,b)-Math.min(a,b)}];
    const mn = Math.min(a,b), mx = Math.max(a,b);
    if (mn && (state.rule === 'frac' || mx % mn === 0)) ops.push({op:'除',r:mx/mn});
    for (const to of ops) {
      const s = state.rule === 'int' ? canSolveInt : canSolveFrac;
      if (s([...rem, to.r])) { document.getElementById('hint-text').innerHTML = '\u8bd5\u8bd5\u628a <strong>' + getCardLabel(a) + '</strong> \u62d6\u5230 <strong>' + getCardLabel(b) + '</strong> \u4e0a\uff0c\u7528 <strong>' + to.op + '</strong> \ud83d\udc46'; hintModal.classList.add('show'); return; }

// === 心算链条 ===
var _mc = { chain:[], step:0, total:0, correct:0, streak:0, timer:null, buf:"" };
var MC_CFG = { steps:4, range:"easy", ops:"addsub", pace:"normal" };
var PACE_MS = { normal:3000, fast:2000, rapid:1500 };
var R_CFG = {easy:{sL:1,sH:10,mM:25,iM:10},medium:{sL:1,sH:20,mM:50,iM:15}};

function mcGen(s,r,o){
  var c=R_CFG[r]||R_CFG.easy;
  var p=o==="addsub"?["+","-"]:o==="addsubmul"?["+","-","×"]:["+","-","×","÷"];
  for(var a=0;a<500;a++){
    var ch=[];var v=Math.floor(Math.random()*(c.sH-c.sL+1))+c.sL;ch.push(v);var ok=true;
    var mm6=[2,3,4,5,6];
    for(var i=0;i<s;i++){
      var av=[];
      for(var oi=0;oi<p.length;oi++){var op=p[oi];if(op==="+"&&v<c.mM)av.push("+");else if(op==="-"&&v>=2)av.push("-");else if(op==="×"&&Math.min(6,Math.floor(c.mM/v))>=2)av.push("×");else if(op==="÷"){for(var d=2;d<=Math.min(v,6);d++){if(v%d===0){av.push("÷");break;}}}}
      if(av.length===0){ok=false;break;}
      var ch2=av[Math.floor(Math.random()*av.length)];var n;
      if(ch2==="+"){n=Math.floor(Math.random()*Math.min(c.mM-v,c.iM))+1;v+=n;}
      else if(ch2==="-"){n=Math.floor(Math.random()*Math.min(v-1,c.iM))+1;v-=n;}
      else if(ch2==="×"){n=Math.floor(Math.random()*(Math.min(6,Math.floor(c.mM/v))-1))+2;v*=n;}
      else{var ds=[];for(var d=2;d<=Math.min(v,6);d++){if(v%d===0)ds.push(d);}n=ds[Math.floor(Math.random()*ds.length)];v=Math.floor(v/n);}
      ch.push(ch2,n);
    }
    if(ok)return ch;
  }
  var ch=[];var v=Math.floor(Math.random()*10)+1;ch.push(v);
  for(var i=0;i<s;i++){var op=i%2===0?"+":"-";n=Math.floor(Math.random()*5)+1;if(op==="+"){if(v+n>c.mM){n=c.mM-v;if(n<1)n=1;}v+=n;}else{n=Math.min(n,v-1);if(n<1)n=1;v-=n;}ch.push(op,n);}
  return ch;
}

function mcRes(ch){var v=ch[0];for(var i=1;i<ch.length;i+=2){var op=ch[i],n=ch[i+1];if(op==="+")v+=n;else if(op==="-")v-=n;else if(op==="×")v*=n;else v=Math.floor(v/n);}return v;}

function mcRecap(ch){var v=ch[0];var h='<span style=color:#60a5fa;font-weight:600>'+v+'</span>';for(var i=1;i<ch.length;i+=2){var op=ch[i],n=ch[i+1];var oc=op==='+'?'+':op==='-'?'−':op==='×'?'×':'÷';if(op==='+')v+=n;else if(op==='-')v-=n;else if(op==='×')v*=n;else v=Math.floor(v/n);h+=' <span style=color:rgba(255,255,255,.3)>→</span> <span style=color:rgba(255,255,255,.4)>'+oc+'</span><span style=color:#60a5fa;font-weight:600>'+n+'</span> <span style=color:rgba(255,255,255,.3)>=</span>'+(i+2>=ch.length?'<span style=color:#34d399;font-weight:700>'+v+'</span>':'<span style=color:#60a5fa>'+v+'</span>');}return h;}

function mcStart(){
  _mc.total=0;_mc.correct=0;_mc.streak=0;_mc.buf="";
  document.getElementById("mc-start-screen").style.display="none";
  document.getElementById("mc-game").style.display="flex";
  document.getElementById("mc-card").style.transform="";
  document.getElementById("mc-score").textContent="0/0";
  var rl={easy:"简单",medium:"中等",hard:"困难"};var ol={addsub:"加减",addsubmul:"加减乘",all:"加减乘除"};var pl={normal:"标准",fast:"快速",rapid:"极速"};
  document.getElementById("mc-config").textContent=MC_CFG.steps+"步 · "+(rl[MC_CFG.range]||"简单")+" · "+(ol[MC_CFG.ops]||"加减")+" · "+(pl[MC_CFG.pace]||"标准");
  mcRun();
}

function mcRun(){
  _mc.chain=mcGen(MC_CFG.steps,MC_CFG.range,MC_CFG.ops);
  _mc.step=0;_mc.buf="";
  document.getElementById("mc-round").textContent="第 "+(_mc.total+1)+" 题";
  document.getElementById("mc-numpad").style.display="none";
  document.getElementById("mc-card").style.transform="";
  document.getElementById("mc-input").textContent="";
  document.getElementById("mc-progress").innerHTML="";
  document.getElementById("mc-confirm").disabled=true;
  mcNextStep();
}

function mcNextStep(){
  var c=_mc.chain;
  if(_mc.step>=c.length){
    document.getElementById("mc-display").textContent="?";
    document.getElementById("mc-sub").textContent="答案是多少？";
    document.getElementById("mc-numpad").style.display="block";
    document.getElementById("mc-card").style.transform="translateY(-12px)";
    return;
  }
  var v=c[_mc.step];
  if(_mc.step===0){document.getElementById("mc-display").innerHTML="<span style='color:#60a5fa'>"+v+"</span>";document.getElementById("mc-sub").textContent="记住这个数字";}
  else{var op=c[_mc.step-1];var oc=op==="+"?"+":op==="-"?"-":op==="×"?"×":"÷";document.getElementById("mc-display").innerHTML="<span style='color:rgba(255,255,255,.6)'>"+oc+"</span><span style='color:#60a5fa'>"+v+"</span>";document.getElementById("mc-sub").textContent="心算结果...";}
  _mc.step+=2;
  clearTimeout(_mc.timer);
  _mc.timer=setTimeout(mcNextStep, PACE_MS[MC_CFG.pace]||2500);
}

function mcCheck(){
  var ans=parseInt(_mc.buf);if(isNaN(ans))return;
  var correct=mcRes(_mc.chain);var ok=(ans===correct);
  _mc.total++;if(ok){_mc.correct++;_mc.streak++;}else _mc.streak=0;
  document.getElementById("mc-score").textContent=_mc.correct+"/"+_mc.total;
  document.getElementById("mc-ricon").textContent=ok?"🎉":"😅";
  document.getElementById("mc-rtitle").textContent=ok?"✅ 恭喜答对了":"❌ 还差一点点";
  document.getElementById("mc-rcap").innerHTML="操作链：<br>"+mcRecap(_mc.chain);
  if(ok&&_mc.streak>=2){document.getElementById("mc-rstreak").style.display="block";document.getElementById("mc-rstreak").textContent="🔥 连续答对 "+_mc.streak+" 题";}else document.getElementById("mc-rstreak").style.display="none";
  document.getElementById("mc-rstats").textContent="正确 "+_mc.correct+" 题，共 "+_mc.total+" 题";
  document.getElementById("mc-modal").style.display="flex";
}

}
